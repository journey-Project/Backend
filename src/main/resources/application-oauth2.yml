social:
  kakao:
    client-id: "${KAKAO_CLIENT_ID}"
    client-secret: "${KAKAO_CLIENT_SECRET}"
    redirect-uri: "http://localhost:5173/api/oauth2/callback/kakao"

  naver:
    client-id: "${NAVER_CLIENT_ID}"
    client-secret: "${NAVER_CLIENT_SECRET}"
    redirect-uri: "http://localhost:5173/api/oauth2/callback/naver"

  google:
    client-id: "${GOOGLE_CLIENT_ID}"
    client-secret: "${GOOGLE_CLIENT_SECRET}"
    redirect-uri: "http://localhost:5173/api/oauth2/callback/google"



