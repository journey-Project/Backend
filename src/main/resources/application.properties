# MySQL ??
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Redis ??
spring.redis.host=${SPRING_REDIS_HOST}
spring.redis.port=${SPRING_REDIS_PORT}

# OAuth2 ?? (application-XXX.properties ??)
spring.profiles.include=oauth2

# Thymeleaf ??
spring.thymeleaf.cache=false

# ?? ??
logging.level.org.springframework=INFO
logging.level.com.project=DEBUG

# swagger-ui custom path
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true
spring.web.locale=ko_KR
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.servlet.encoding.force=true
spring.servlet.encoding.charset=UTF-8
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# 배포 해결 임시..
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp