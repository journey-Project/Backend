# MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.redis.host=${SPRING_REDIS_HOST}
spring.redis.port=${SPRING_REDIS_PORT}

# OAuth2
spring.profiles.include=oauth2

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.project=DEBUG

# Swagger
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true
spring.web.locale=ko_KR
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.servlet.encoding.force=true
spring.servlet.encoding.charset=UTF-8
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui